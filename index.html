<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Wochenplan V4</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="titlewrap">
      <h1>Wochenplan</h1>
      <div class="small">Handy-Ansicht für Mo-Sa</div>
    </div>

    <div class="weekrange">
      <label>
        Woche von
        <input id="weekFrom" type="date" />
      </label>
      <label>
        bis
        <input id="weekTo" type="date" />
      </label>
    </div>

    <div class="toolbar">
      <button id="btnSave">Speichern</button>
      <button id="btnClearWeek">Woche leeren</button>
      <button id="btnPrint">Drucken / PDF</button>
    </div>
  </header>

  <section class="teamsetup">
    <div class="sectionhead">
      <h2>Team</h2>
      <div class="small">Feste Reihenfolge für die Planung</div>
    </div>
    <div id="teamList" class="teamlist"></div>
  </section>

  <section class="daynav">
    <div class="sectionhead">
      <h2>Planung</h2>
      <div class="small">Früh zuerst, dann Spät</div>
    </div>

    <div id="dayTabs" class="tabs"></div>

    <div class="daymeta">
      <div class="metaBox">
        <strong id="metaDayName">Montag</strong>
        <div id="lateCountInfo">19:10 heute: 0 / 2</div>
      </div>
      <div class="metaBox">
        <strong>Warnungen</strong>
        <div id="dayWarnings" class="warnText">Keine Warnungen.</div>
      </div>
    </div>

    <div id="plannerList" class="plannerList"></div>
  </section>

  <section class="overview">
    <div class="sectionhead">
      <h2>Wochenübersicht</h2>
      <div class="small">Kontrolle für die ganze Woche</div>
    </div>

    <div class="tableWrap">
      <table id="overviewTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Funktion</th>
            <th>Soll</th>
            <th>Mo</th>
            <th>Di</th>
            <th>Mi</th>
            <th>Do</th>
            <th>Fr</th>
            <th>Sa</th>
            <th>Ist</th>
            <th>Delta</th>
          </tr>
        </thead>
        <tbody id="overviewBody"></tbody>
      </table>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
